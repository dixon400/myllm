model_list:

  # --- Local models via Ollama (auto-discovered from `ollama list`) ---
  - model_name: ollama-gpt-oss-20b
    litellm_params:
      model: ollama/gpt-oss:20b
      api_base: http://host.docker.internal:11434

  - model_name: ollama-llama3.2-latest
    litellm_params:
      model: ollama/llama3.2:latest
      api_base: http://host.docker.internal:11434


  # --- Groq — free tier, fast overflow ---
  - model_name: groq-oss-120b
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-llama3-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-qwen3-32b
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY

  # --- OpenAI ---
  - model_name: gpt-5.2
    litellm_params:
      model: openai/gpt-5.2
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.4-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

  # --- Anthropic ---
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-3-5-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  drop_params: true
  max_budget: 50          # total $ budget across all users per month
  budget_duration: monthly

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY